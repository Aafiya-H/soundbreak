<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e05050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Sound wave bars (clean, white) -->
  <rect x="10" y="24" width="4" height="16" rx="2" fill="white" opacity="0.9"/>
  <rect x="17" y="18" width="4" height="28" rx="2" fill="white" opacity="0.9"/>
  <rect x="24" y="22" width="4" height="20" rx="2" fill="white" opacity="0.9"/>

  <!-- Lightning bolt (break / attack indicator) -->
  <polygon points="36,14 28,34 34,34 28,50 44,28 37,28" fill="white"/>
</svg>
